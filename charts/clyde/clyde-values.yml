clyde:
  logLevel: "INFO"
  containerdContentPath: "/var/lib/containerd/io.containerd.content.v1.content"
  debugWebEnabled: true

serviceMonitor:
  # -- If true creates a Prometheus Service Monitor.
  enabled: false
  interval: 15s
  scrapeTimeout: 15s
  namespace: monitoring
  labels:
    release: kube-prometheus-stack

grafanaDashboard:
  # -- If true creates a Grafana dashboard.
  enabled: true

pip:
  # -- hostPath used for pip package cache (.whl/.tar.gz) and rewritten index html
  pipCacheDir: "/data/cache/pip/wheel"
  # -- hostPath mounted into init container to write /etc/pip.conf
  pipConfigPath: "/etc"
  # -- timeout used by pip-configuration init container when writing pip.conf
  timeout: 300
  # -- fallback upstream index used by pip handler when peer/local miss occurs
  indexURL: "https://pypi.org/simple"

hf:
  # -- hostPath used for Hugging Face cache layout (refs/, snapshots/, blobs/)
  hfCacheDir: "/data/cache/hf/model"
