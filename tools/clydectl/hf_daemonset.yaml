apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: hf-exp
spec:
  selector:
    matchLabels:
      app: hf-exp
  template:
    metadata:
      labels:
        app: hf-exp
    spec:
      # Allow pods to run on control-plane nodes
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"

      containers:
        - name: hf-exp
          image: ghcr.io/clyde-org/hf.exp:v1.7
          imagePullPolicy: Always
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: USE_LOCAL_PROXY
              value: "false"
          volumeMounts:
            - name: hf-cache
              mountPath: /data/cache/hf/model

      volumes:
        - name: hf-cache
          hostPath:
            path: /data/cache/hf/model  # Path on the host node
            type: DirectoryOrCreate      # Creates directory if missing
